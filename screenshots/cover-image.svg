<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40" />
    </filter>
    <filter id="blur2">
      <feGaussianBlur in="SourceGraphic" stdDeviation="60" />
    </filter>
    <filter id="textglow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)" />

  <!-- Ambient glow orbs -->
  <circle cx="200" cy="200" r="180" fill="#6366f1" opacity="0.06" filter="url(#blur2)" />
  <circle cx="1000" cy="150" r="200" fill="#8b5cf6" opacity="0.05" filter="url(#blur2)" />
  <circle cx="600" cy="350" r="150" fill="#a78bfa" opacity="0.04" filter="url(#blur2)" />

  <!-- Grid pattern (subtle) -->
  <g opacity="0.04" stroke="#a78bfa" stroke-width="0.5">
    <line x1="0" y1="80" x2="1200" y2="80" />
    <line x1="0" y1="160" x2="1200" y2="160" />
    <line x1="0" y1="240" x2="1200" y2="240" />
    <line x1="0" y1="320" x2="1200" y2="320" />
    <line x1="120" y1="0" x2="120" y2="400" />
    <line x1="240" y1="0" x2="240" y2="400" />
    <line x1="360" y1="0" x2="360" y2="400" />
    <line x1="480" y1="0" x2="480" y2="400" />
    <line x1="600" y1="0" x2="600" y2="400" />
    <line x1="720" y1="0" x2="720" y2="400" />
    <line x1="840" y1="0" x2="840" y2="400" />
    <line x1="960" y1="0" x2="960" y2="400" />
    <line x1="1080" y1="0" x2="1080" y2="400" />
  </g>

  <!-- Decorative connection lines -->
  <g opacity="0.12" stroke="url(#accent1)" stroke-width="1" fill="none">
    <circle cx="100" cy="120" r="3" fill="#6366f1" opacity="0.6" />
    <circle cx="160" cy="85" r="2" fill="#8b5cf6" opacity="0.5" />
    <circle cx="80" cy="200" r="2.5" fill="#a78bfa" opacity="0.5" />
    <circle cx="180" cy="180" r="2" fill="#6366f1" opacity="0.4" />
    <line x1="100" y1="120" x2="160" y2="85" />
    <line x1="100" y1="120" x2="80" y2="200" />
    <line x1="100" y1="120" x2="180" y2="180" />
    <line x1="80" y1="200" x2="180" y2="180" />

    <circle cx="1080" cy="280" r="3" fill="#6366f1" opacity="0.6" />
    <circle cx="1120" cy="220" r="2" fill="#8b5cf6" opacity="0.5" />
    <circle cx="1040" cy="330" r="2.5" fill="#a78bfa" opacity="0.5" />
    <circle cx="1140" cy="310" r="2" fill="#6366f1" opacity="0.4" />
    <line x1="1080" y1="280" x2="1120" y2="220" />
    <line x1="1080" y1="280" x2="1040" y2="330" />
    <line x1="1080" y1="280" x2="1140" y2="310" />
    <line x1="1040" y1="330" x2="1140" y2="310" />
  </g>

  <!-- Title glow -->
  <text x="600" y="140" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="800" fill="#6366f1" opacity="0.3" filter="url(#textglow)" letter-spacing="6">TEST ORCHESTRATOR</text>

  <!-- Title -->
  <text x="600" y="140" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="6">TEST ORCHESTRATOR</text>

  <!-- Accent line under title -->
  <rect x="420" y="160" width="360" height="3" rx="1.5" fill="url(#accent1)" opacity="0.8" />

  <!-- Subtitle -->
  <text x="600" y="205" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#94a3b8" letter-spacing="1">Unit tests (Vitest/Jest) and E2E tests (Playwright) in parallel</text>

  <!-- Domain pill -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="500">
    <rect x="558" y="235" width="84" height="30" rx="15" fill="#6366f1" opacity="0.15" stroke="#6366f1" stroke-width="0.8" stroke-opacity="0.3" />
    <text x="600" y="255" text-anchor="middle" fill="#a5b4fc">Testing</text>
  </g>

  <!-- Part of Creo Toolkit -->
  <text x="600" y="340" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#64748b" letter-spacing="2">Part of Creo Toolkit</text>

  <!-- Border glow (top and bottom) -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#accent1)" opacity="0.6" />
  <rect x="0" y="398" width="1200" height="2" fill="url(#accent1)" opacity="0.3" />
</svg>
